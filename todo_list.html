function apiGet(cb){fetch(SCRIPT_URL).then(function(r){return r.json();}).then(function(j){if(j.status==='ok'&&j.data)cb(null,j.data);else cb('Bad');}).catch(function(e){cb(e);});}
function apiPost(p,cb){fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)}).then(function(r){return r.text();}).then(function(t){try{cb(null,JSON.parse(t));}catch(e){cb(null,{status:'ok'});}}).catch(function(e){cb(e);});}
function showToast(m,err){var el=document.getElementById('toast');el.textContent=m;el.className='toast'+(err?' error':'');clearTimeout(el._t);el._t=setTimeout(function(){el.className='toast hidden';},3000);}

function render(){
if(!data)return;
var items=data[activeTab]||[];
var taskItems=items.filter(function(i){return i.type!=='category';});
var doneCount=taskItems.filter(function(i){return(i.status||'').indexOf('Complete')===0;}).length;
var allTags=getAllTags(activeTab);
var filtered=items.filter(function(i){if(i.type==='category')return true;var sOk=activeFilter==='all'||(activeFilter==='complete'?(i.status||'').indexOf('Complete')===0:i.status===activeFilter);return sOk&&itemMatchesTag(i);});
var h='';
h+='<div class="header"><div class="header-top"><div><h1>Mirror Image & Ink Kitchen</h1><div class="sub">'+doneCount+' of '+taskItems.length+' complete</div></div><div class="header-actions"><button class="btn-ghost" onclick="seedData()">Seed initial data</button><button class="btn-ghost" onclick="refreshData()">Refresh</button></div></div>';
h+='<div class="tabs">';var tns=Object.keys(data);for(var t=0;t<tns.length;t++){var tn=tns[t];var cnt=(data[tn]||[]).filter(function(i){return i.type!=='category';}).length;h+='<button class="tab-btn'+(activeTab===tn?' active':'')+'" onclick="switchTab(\''+tn+'\')">'+tn+'<span class="tab-count">('+cnt+')</span></button>';}
h+='</div></div>';
h+='<div class="filter-bar"><div class="filter-row"><span class="filter-label">Status:</span>';
var fs=['all','Not Started','In Process','Partially Complete','complete','Blocked'];
for(var f=0;f<fs.length;f++){var fv=fs[f];var fl=fv==='all'?'All':(fv==='complete'?'Complete':fv);h+='<button class="filter-btn'+(activeFilter===fv?' active':'')+'" onclick="setFilter(\''+fv+'\')">'+fl+'</button>';}
h+='</div>';
if(allTags.length>0){h+='<div class="filter-row"><span class="filter-label">Person:</span><button class="filter-btn'+(activeTagFilter==='all'?' tag-active':'')+'" onclick="setTagFilter(\'all\')">All</button>';for(var g=0;g<allTags.length;g++){h+='<button class="filter-btn'+(activeTagFilter===allTags[g]?' tag-active':'')+'" onclick="setTagFilter(\''+esc(allTags[g])+'\')">'+esc(allTags[g])+'</button>';}h+='</div>';}
h+='</div>';
h+='<div class="table-wrap"><table><thead><tr><th style="text-align:center;width:36px">#</th><th>TO-DO</th><th style="width:110px">OWNER</th><th style="width:170px">STATUS</th><th style="width:64px"></th></tr></thead><tbody>';
for(var i=0;i<filtered.length;i++){var item=filtered[i];if(item.type==='category')h+=renderCat(item);else h+=renderItem(item);}
h+='<tr><td></td><td colspan="3"><div class="add-row"><input class="add-input" id="addInput" placeholder="Add new item..." onkeydown="if(event.key===\'Enter\')addItem()"><button class="add-btn" onclick="addItem()">+ Item</button><button class="add-btn sec" onclick="addSection()">+ Section</button></div></td><td></td></tr>';
h+='</tbody></table></div>';
document.getElementById('app').innerHTML=h;
}

function renderCat(item){return '<tr class="cat-row"><td colspan="5"><div class="cat-content"><span class="cat-label" onclick="startEditCat(\''+item.id+'\')" id="cat-'+item.id+'">'+esc(item.label)+'</span><button class="cat-del" onclick="deleteCat(\''+item.id+'\')" title="Delete section">×</button></div></td></tr>';}

function renderItem(item){
var srcExp=expandedSources[item.id],noteExp=expandedNotes[item.id];
var sc=STATUS_COLORS[item.status]||STATUS_COLORS['Not Started'],tags=item.tags||[],other=otherTab(activeTab);
var hasSrc=item.source&&item.source.trim();
var hasNote=item.notes&&item.notes.trim();
var h='<tr class="item-row"><td class="num-cell">'+(item.num||'')+'</td><td>';
h+='<div class="todo-text" onclick="startEdit(\''+item.id+'\',\'todo\')" id="td-'+item.id+'">'+esc(item.todo)+'</div>';
// Tags
h+='<div class="tags-row">';
for(var t=0;t<tags.length;t++){h+='<span class="tag">'+esc(tags[t])+'<span class="tag-x" onclick="removeTag(\''+item.id+'\',\''+esc(tags[t])+'\')">&times;</span></span>';}
if(addingTagTo===item.id){h+='<span style="display:inline-flex;gap:4px;align-items:center"><input id="tagInput" placeholder="Name..." style="width:80px;font-size:11px;padding:2px 6px;border:1px solid #7c3aed;border-radius:4px" onkeydown="if(event.key===\'Enter\')confirmTag(\''+item.id+'\');if(event.key===\'Escape\'){addingTagTo=null;render();}"><button onclick="confirmTag(\''+item.id+'\')" style="background:#7c3aed;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer">+</button></span>';}
else{h+='<span class="tag-add" onclick="startAddTag(\''+item.id+'\')">+ tag</span>';}
h+='</div>';
// Meta toggles: source and notes
h+='<div class="meta-row">';
if(hasSrc){h+='<span class="meta-toggle" onclick="toggleSource(\''+item.id+'\')"><span class="arrow'+(srcExp?' open':'')+'">▸</span>source</span>';}
h+='<span class="meta-toggle" onclick="toggleNotes(\''+item.id+'\')"><span class="arrow'+(noteExp?' open':'')+'">▸</span>'+(hasNote?'notes':'+ notes')+'</span>';
h+='</div>';
// Source box
if(srcExp&&hasSrc){h+='<div class="meta-box source-box" onclick="startEdit(\''+item.id+'\',\'source\')" id="src-'+item.id+'">'+esc(item.source)+'<button class="meta-clear" onclick="event.stopPropagation();clearField(\''+item.id+'\',\'source\')" title="Remove source">×</button></div>';}
// Notes box
if(noteExp){
if(hasNote){h+='<div class="meta-box notes-box" onclick="startEdit(\''+item.id+'\',\'notes\')" id="note-'+item.id+'">'+esc(item.notes)+'<button class="meta-clear" onclick="event.stopPropagation();clearField(\''+item.id+'\',\'notes\')" title="Clear notes">×</button></div>';}
else{h+='<div class="meta-box notes-box" onclick="startEdit(\''+item.id+'\',\'notes\')" id="note-'+item.id+'" style="color:#9ca3af;font-style:italic">Click to add notes...</div>';}
}
h+='</td><td class="owner-cell" onclick="startEdit(\''+item.id+'\',\'owner\')" id="own-'+item.id+'">'+esc(item.owner||'—')+'</td>';
h+='<td class="status-cell"><button class="status-badge" style="background:'+sc.bg+';color:'+sc.text+'" onclick="toggleDropdown(\''+item.id+'\')"><span class="status-dot" style="background:'+sc.dot+'"></span>'+esc(item.status||'Not Started')+'</button>';
if(openDropdown===item.id){h+='<div class="dropdown">';for(var s=0;s<STATUS_OPTIONS.length;s++){var o=STATUS_OPTIONS[s],c=STATUS_COLORS[o]||STATUS_COLORS['Not Started'];h+='<div class="dropdown-item'+(item.status===o?' selected':'')+'" onclick="setStatus(\''+item.id+'\',\''+o.replace(/'/g,"\\'")+'\')">';h+='<span class="status-dot" style="background:'+c.dot+'"></span>'+esc(o)+'</div>';}h+='</div>';}
h+='</td><td class="actions-cell"><button class="action-btn" onclick="moveItem(\''+item.id+'\')" title="Move to '+esc(other)+'">⇄</button><button class="action-btn del" onclick="deleteItem(\''+item.id+'\')" title="Delete">×</button></td></tr>';
return h;
}

function switchTab(t){activeTab=t;activeFilter='all';activeTagFilter='all';openDropdown=null;addingTagTo=null;render();}
function setFilter(f){activeFilter=f;openDropdown=null;render();}
function setTagFilter(t){activeTagFilter=t;openDropdown=null;render();}
function toggleSource(id){expandedSources[id]=!expandedSources[id];render();}
function toggleNotes(id){expandedNotes[id]=!expandedNotes[id];render();}
function toggleDropdown(id){openDropdown=openDropdown===id?null:id;render();}
function findItem(id){var items=data[activeTab]||[];for(var i=0;i<items.length;i++){if(items[i].id===id)return items[i];}return null;}
function setStatus(id,s){var item=findItem(id);if(!item)return;item.status=s;openDropdown=null;render();apiPost({action:'update',tab:activeTab,item:item},function(e){if(e)showToast('Failed',true);else showToast('Updated');});}

function clearField(id,field){
var item=findItem(id);if(!item)return;
item[field]='';
if(field==='source')expandedSources[id]=false;
if(field==='notes')expandedNotes[id]=false;
render();
apiPost({action:'update',tab:activeTab,item:item},function(e){if(e)showToast('Failed',true);else showToast(field+' cleared');});
}

function startEdit(id,field){
var item=findItem(id);if(!item)return;
var pre={todo:'td-',source:'src-',owner:'own-',notes:'note-'},el=document.getElementById(pre[field]+id);if(!el)return;
var ml=(field==='todo'||field==='source'||field==='notes'),val=item[field]||'';
if(ml)el.innerHTML='<textarea class="edit-input" rows="3" id="edit-active">'+esc(val)+'</textarea>';
else el.innerHTML='<input class="edit-input" id="edit-active" value="'+esc(val)+'">';
var inp=document.getElementById('edit-active');inp.focus();
inp.onblur=function(){var nv=inp.value;if(nv!==val){item[field]=nv;apiPost({action:'update',tab:activeTab,item:item},function(e){if(e)showToast('Failed',true);});}render();};
inp.onkeydown=function(e){if(e.key==='Escape')render();if(e.key==='Enter'&&!ml)inp.blur();};
}
function startEditCat(id){
var item=findItem(id);if(!item)return;var el=document.getElementById('cat-'+id);if(!el)return;
el.innerHTML='<input class="edit-input" id="edit-active" value="'+esc(item.label)+'" style="font-weight:700;font-size:13px">';
var inp=document.getElementById('edit-active');inp.focus();
inp.onblur=function(){if(inp.value!==item.label){item.label=inp.value;apiPost({action:'update',tab:activeTab,item:item},function(e){if(e)showToast('Failed',true);});}render();};
inp.onkeydown=function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape')render();};
}

function deleteItem(id){if(!confirm('Delete this item?'))return;data[activeTab]=data[activeTab].filter(function(i){return i.id!==id;});render();apiPost({action:'delete',tab:activeTab,id:id},function(e){if(e)showToast('Failed',true);else showToast('Deleted');});}
function deleteCat(id){if(!confirm('Delete this section header? Items below stay.'))return;data[activeTab]=data[activeTab].filter(function(i){return i.id!==id;});render();apiPost({action:'delete',tab:activeTab,id:id},function(e){if(e)showToast('Failed',true);else showToast('Section deleted');});}

function addItem(){var inp=document.getElementById('addInput');var t=(inp.value||'').trim();if(!t)return;var items=data[activeTab].filter(function(i){return i.type!=='category';});var mx=0;for(var i=0;i<items.length;i++){if((items[i].num||0)>mx)mx=items[i].num;}var pfx=activeTab==='Mirror Image'?'mi':'ik';var ni={id:pfx+'-'+Date.now(),num:mx+1,todo:t,category:'',source:'',owner:'',status:'Not Started',tags:[],notes:''};data[activeTab].push(ni);render();apiPost({action:'add',tab:activeTab,item:ni},function(e){if(e)showToast('Failed',true);else showToast('Added');});}
function addSection(){var l=prompt('Section name:');if(!l||!l.trim())return;var pfx=activeTab==='Mirror Image'?'mi':'ik';var nc={id:pfx+'-cat-'+Date.now(),type:'category',label:l.trim()};data[activeTab].push(nc);render();apiPost({action:'add',tab:activeTab,item:nc},function(e){if(e)showToast('Failed',true);else showToast('Section added');});}

function moveItem(id){var item=findItem(id);if(!item)return;var dest=otherTab(activeTab);if(!confirm('Move to '+dest+'?'))return;data[activeTab]=data[activeTab].filter(function(i){return i.id!==id;});var di=(data[dest]||[]).filter(function(i){return i.type!=='category';});var mx=0;for(var i=0;i<di.length;i++){if((di[i].num||0)>mx)mx=di[i].num;}item.num=mx+1;data[dest].push(item);render();apiPost({action:'delete',tab:activeTab,id:id},function(e1){apiPost({action:'add',tab:dest,item:item},function(e2){if(e1||e2)showToast('Move may have partially failed',true);else showToast('Moved to '+dest);});});}

function startAddTag(id){addingTagTo=id;render();setTimeout(function(){var el=document.getElementById('tagInput');if(el)el.focus();},50);}
function confirmTag(id){var inp=document.getElementById('tagInput');if(!inp)return;var raw=(inp.value||'').trim();if(!raw){addingTagTo=null;render();return;}var tag=normalizeTag(raw);var item=findItem(id);if(!item)return;if(!item.tags)item.tags=[];if(item.tags.map(normalizeTag).indexOf(tag)<0)item.tags.push(tag);addingTagTo=null;render();apiPost({action:'update',tab:activeTab,item:item},function(e){if(e)showToast('Failed',true);});}
function removeTag(id,tag){var item=findItem(id);if(!item||!item.tags)return;var norm=normalizeTag(tag);item.tags=item.tags.filter(function(t){return normalizeTag(t)!==norm;});render();apiPost({action:'update',tab:activeTab,item:item},function(e){if(e)showToast('Failed',true);});}

function refreshData(){showToast('Refreshing...');apiGet(function(e,r){if(e){showToast('Failed',true);return;}var has=false;var tabs=Object.keys(r);for(var i=0;i<tabs.length;i++){if(r[tabs[i]].length>0){has=true;break;}}if(has){data=r;render();showToast('Refreshed');}else showToast('Sheet empty — Seed first');});}
function seedData(){if(!confirm('Populate Google Sheet with all items?'))return;showToast('Seeding MI...');apiPost({action:'seed',tab:'Mirror Image',items:INITIAL_DATA['Mirror Image']},function(e){if(e){showToast('Failed MI',true);return;}showToast('Seeding IK...');apiPost({action:'seed',tab:'Ink Kitchen',items:INITIAL_DATA['Ink Kitchen']},function(e2){if(e2){showToast('Failed IK',true);return;}data=JSON.parse(JSON.stringify(INITIAL_DATA));render();showToast('All data seeded!');});});}

document.addEventListener('click',function(e){if(openDropdown&&!e.target.closest('.status-cell')){openDropdown=null;render();}});

(function init(){
if(SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){data=JSON.parse(JSON.stringify(INITIAL_DATA));render();showToast('Local mode — connect Google Sheet for sync');return;}
apiGet(function(e,r){if(e){data=JSON.parse(JSON.stringify(INITIAL_DATA));render();showToast('Offline — local data',true);return;}var has=false;var tabs=Object.keys(r);for(var i=0;i<tabs.length;i++){if(r[tabs[i]].length>0){has=true;break;}}if(has){data=r;render();}else{data=JSON.parse(JSON.stringify(INITIAL_DATA));render();showToast('Sheet empty — click Seed');}});
})();
</script>
