// ============ API CALLS ============
function apiGet(callback) {
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.status === 'ok' && result.data) callback(null, result.data);
      else callback('Bad response');
    })
    .catch(function(err) { callback(err); });
}

function apiPost(payload, callback) {
  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.text(); })
  .then(function(t) {
    try { var j = JSON.parse(t); callback(null, j); }
    catch(e) { callback(null, { status: 'ok' }); }
  })
  .catch(function(err) { callback(err); });
}

// ============ TOAST ============
function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.className = 'toast hidden'; }, 3000);
}

// ============ RENDER ============
function render() {
  if (!data) return;
  
  var items = data[activeTab] || [];
  var taskItems = items.filter(function(i) { return i.type !== 'category'; });
  var doneCount = taskItems.filter(function(i) { return (i.status || '').indexOf('Complete') === 0; }).length;
  
  var filtered = items;
  if (activeFilter !== 'all') {
    filtered = items.filter(function(i) {
      if (i.type === 'category') return true;
      if (activeFilter === 'complete') return (i.status || '').indexOf('Complete') === 0;
      return i.status === activeFilter;
    });
  }
  
  var html = '';
  
  // Header
  html += '<div class="header">';
  html += '<div class="header-top"><div>';
  html += '<h1>Mirror Image & Ink Kitchen</h1>';
  html += '<div class="sub">' + doneCount + ' of ' + taskItems.length + ' items complete</div>';
  html += '</div><div class="header-actions">';
  html += '<button class="btn-ghost" onclick="seedData()">Seed initial data</button>';
  html += '<button class="btn-ghost" onclick="refreshData()">Refresh</button>';
  html += '</div></div>';
  
  // Tabs
  html += '<div class="tabs">';
  var tabNames = Object.keys(data);
  for (var t = 0; t < tabNames.length; t++) {
    var tn = tabNames[t];
    var cnt = (data[tn] || []).filter(function(i) { return i.type !== 'category'; }).length;
    html += '<button class="tab-btn' + (activeTab === tn ? ' active' : '') + '" onclick="switchTab(\'' + tn + '\')">' + tn + '<span class="tab-count">(' + cnt + ')</span></button>';
  }
  html += '</div></div>';
  
  // Filters
  var filters = ['all','Not Started','In Process','Partially Complete','complete','Blocked'];
  html += '<div class="filters">';
  for (var f = 0; f < filters.length; f++) {
    var fv = filters[f];
    var fl = fv === 'all' ? 'All' : (fv === 'complete' ? 'Complete' : fv);
    html += '<button class="filter-btn' + (activeFilter === fv ? ' active' : '') + '" onclick="setFilter(\'' + fv + '\')">' + fl + '</button>';
  }
  html += '</div>';
  
  // Table
  html += '<div class="table-wrap"><table><thead><tr>';
  html += '<th style="text-align:center;width:36px">#</th><th>TO-DO</th><th style="width:110px">OWNER</th><th style="width:170px">STATUS</th><th style="width:32px"></th>';
  html += '</tr></thead><tbody>';
  
  for (var i = 0; i < filtered.length; i++) {
    var item = filtered[i];
    if (item.type === 'category') {
      html += renderCategoryRow(item);
    } else {
      html += renderItemRow(item);
    }
  }
  
  // Add row
  html += '<tr><td></td><td colspan="3"><div class="add-row">';
  html += '<input class="add-input" id="addInput" placeholder="Add new item..." onkeydown="if(event.key===\'Enter\')addItem()">';
  html += '<button class="add-btn" onclick="addItem()">Add</button>';
  html += '</div></td><td></td></tr>';
  
  html += '</tbody></table></div>';
  
  document.getElementById('app').innerHTML = html;
}

function renderCategoryRow(item) {
  return '<tr class="cat-row"><td colspan="5" onclick="startEditCat(\'' + item.id + '\')" id="cat-' + item.id + '">' + esc(item.label) + '</td></tr>';
}

function renderItemRow(item) {
  var expanded = expandedSources[item.id];
  var sc = STATUS_COLORS[item.status] || STATUS_COLORS['Not Started'];
  
  var h = '<tr class="item-row">';
  h += '<td class="num">' + (item.num || '') + '</td>';
  h += '<td>';
  h += '<div class="todo-text" onclick="startEdit(\'' + item.id + '\',\'todo\')" id="td-' + item.id + '">' + esc(item.todo) + '</div>';
  h += '<div class="source-toggle" onclick="toggleSource(\'' + item.id + '\')"><span class="arrow' + (expanded ? ' open' : '') + '">▸</span>' + (expanded ? 'hide source' : 'show source') + '</div>';
  if (expanded) {
    h += '<div class="source-box" onclick="startEdit(\'' + item.id + '\',\'source\')" id="src-' + item.id + '">' + esc(item.source || '—') + '</div>';
  }
  h += '</td>';
  h += '<td class="owner" onclick="startEdit(\'' + item.id + '\',\'owner\')" id="own-' + item.id + '">' + esc(item.owner || '—') + '</td>';
  h += '<td class="status-cell">';
  h += '<button class="status-badge" style="background:' + sc.bg + ';color:' + sc.text + '" onclick="toggleDropdown(\'' + item.id + '\')">';
  h += '<span class="status-dot" style="background:' + sc.dot + '"></span>' + esc(item.status || 'Not Started') + '</button>';
  if (openDropdown === item.id) {
    h += renderDropdown(item);
  }
  h += '</td>';
  h += '<td class="del-cell"><button class="del-btn" onclick="deleteItem(\'' + item.id + '\')" title="Delete">×</button></td>';
  h += '</tr>';
  return h;
}

function renderDropdown(item) {
  var h = '<div class="dropdown" id="dd-' + item.id + '">';
  for (var s = 0; s < STATUS_OPTIONS.length; s++) {
    var opt = STATUS_OPTIONS[s];
    var sc = STATUS_COLORS[opt] || STATUS_COLORS['Not Started'];
    h += '<div class="dropdown-item' + (item.status === opt ? ' selected' : '') + '" onclick="setStatus(\'' + item.id + '\',\'' + opt.replace(/'/g,"\\'") + '\')">';
    h += '<span class="status-dot" style="background:' + sc.dot + '"></span>' + esc(opt) + '</div>';
  }
  h += '</div>';
  return h;
}

// ============ ACTIONS ============
function switchTab(tab) { activeTab = tab; activeFilter = 'all'; openDropdown = null; render(); }
function setFilter(f) { activeFilter = f; openDropdown = null; render(); }

function toggleSource(id) {
  expandedSources[id] = !expandedSources[id];
  render();
}

function toggleDropdown(id) {
  openDropdown = openDropdown === id ? null : id;
  render();
}

function findItem(id) {
  var items = data[activeTab] || [];
  for (var i = 0; i < items.length; i++) { if (items[i].id === id) return items[i]; }
  return null;
}

function setStatus(id, status) {
  var item = findItem(id);
  if (!item) return;
  item.status = status;
  openDropdown = null;
  render();
  apiPost({ action: 'update', tab: activeTab, item: item }, function(err) {
    if (err) showToast('Failed to save', true);
    else showToast('Status updated');
  });
}

function startEdit(id, field) {
  var item = findItem(id);
  if (!item) return;
  
  var prefixes = { todo: 'td-', source: 'src-', owner: 'own-' };
  var el = document.getElementById(prefixes[field] + id);
  if (!el) return;
  
  var isMulti = (field === 'todo' || field === 'source');
  var val = item[field] || '';
  
  if (isMulti) {
    el.innerHTML = '<textarea class="edit-input" rows="3" id="edit-active">' + esc(val) + '</textarea>';
  } else {
    el.innerHTML = '<input class="edit-input" id="edit-active" value="' + esc(val) + '">';
  }
  
  var input = document.getElementById('edit-active');
  input.focus();
  
  input.onblur = function() {
    var newVal = input.value;
    if (newVal !== val) {
      item[field] = newVal;
      apiPost({ action: 'update', tab: activeTab, item: item }, function(err) {
        if (err) showToast('Failed to save', true);
      });
    }
    render();
  };
  input.onkeydown = function(e) {
    if (e.key === 'Escape') { render(); }
    if (e.key === 'Enter' && !isMulti) { input.blur(); }
  };
}

function startEditCat(id) {
  var item = findItem(id);
  if (!item) return;
  var el = document.getElementById('cat-' + id);
  if (!el) return;
  
  el.innerHTML = '<input class="edit-input" id="edit-active" value="' + esc(item.label) + '" style="font-weight:700;font-size:13px">';
  var input = document.getElementById('edit-active');
  input.focus();
  input.onblur = function() {
    if (input.value !== item.label) {
      item.label = input.value;
      apiPost({ action: 'update', tab: activeTab, item: item }, function(err) {
        if (err) showToast('Failed to save', true);
      });
    }
    render();
  };
  input.onkeydown = function(e) { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') render(); };
}

function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  var items = data[activeTab];
  data[activeTab] = items.filter(function(i) { return i.id !== id; });
  render();
  apiPost({ action: 'delete', tab: activeTab, id: id }, function(err) {
    if (err) showToast('Failed to delete', true);
    else showToast('Item deleted');
  });
}

function addItem() {
  var input = document.getElementById('addInput');
  var text = (input.value || '').trim();
  if (!text) return;
  
  var items = data[activeTab].filter(function(i) { return i.type !== 'category'; });
  var maxNum = 0;
  for (var i = 0; i < items.length; i++) { if ((items[i].num || 0) > maxNum) maxNum = items[i].num; }
  
  var prefix = activeTab === 'Mirror Image' ? 'mi' : 'ik';
  var newItem = {
    id: prefix + '-' + Date.now(),
    num: maxNum + 1,
    todo: text,
    category: '',
    source: '',
    owner: '',
    status: 'Not Started'
  };
  
  data[activeTab].push(newItem);
  render();
  apiPost({ action: 'add', tab: activeTab, item: newItem }, function(err) {
    if (err) showToast('Failed to add', true);
    else showToast('Item added');
  });
}

function refreshData() {
  showToast('Refreshing...');
  apiGet(function(err, result) {
    if (err) { showToast('Failed to load — using cached data', true); return; }
    
    // Check if sheet has data
    var hasData = false;
    var tabs = Object.keys(result);
    for (var i = 0; i < tabs.length; i++) {
      if (result[tabs[i]].length > 0) { hasData = true; break; }
    }
    
    if (hasData) {
      data = result;
      render();
      showToast('Data refreshed');
    } else {
      showToast('Sheet is empty — click "Seed initial data" to populate');
    }
  });
}

function seedData() {
  if (!confirm('This will populate the Google Sheet with all 53 Mirror Image items and 20 Ink Kitchen items. Continue?')) return;
  
  showToast('Seeding Mirror Image...');
  apiPost({ action: 'seed', tab: 'Mirror Image', items: INITIAL_DATA['Mirror Image'] }, function(err) {
    if (err) { showToast('Failed to seed Mirror Image', true); return; }
    showToast('Seeding Ink Kitchen...');
    apiPost({ action: 'seed', tab: 'Ink Kitchen', items: INITIAL_DATA['Ink Kitchen'] }, function(err2) {
      if (err2) { showToast('Failed to seed Ink Kitchen', true); return; }
      data = JSON.parse(JSON.stringify(INITIAL_DATA));
      render();
      showToast('All data seeded to Google Sheet!');
    });
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
  if (openDropdown && !e.target.closest('.status-cell')) {
    openDropdown = null;
    render();
  }
});

// ============ INIT ============
(function init() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    // No backend configured — use initial data locally
    data = JSON.parse(JSON.stringify(INITIAL_DATA));
    render();
    showToast('Running locally — connect Google Sheet for shared access');
    return;
  }
  
  apiGet(function(err, result) {
    if (err) {
      data = JSON.parse(JSON.stringify(INITIAL_DATA));
      render();
      showToast('Offline — using local data', true);
      return;
    }
    
    var hasData = false;
    var tabs = Object.keys(result);
    for (var i = 0; i < tabs.length; i++) {
      if (result[tabs[i]].length > 0) { hasData = true; break; }
    }
    
    if (hasData) {
      data = result;
      render();
    } else {
      data = JSON.parse(JSON.stringify(INITIAL_DATA));
      render();
      showToast('Sheet empty — click "Seed initial data" to populate');
    }
  });
})();
</script>
</body>
</html>
